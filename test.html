<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test</title>
<style>
  body {
    font-family: sans-serif;
    font-size: 40px;
    margin: 50px;
  }
  
  .test-case {
    margin-bottom: 40px;
  }

  /* Current approach */
  .na-dot-above {
    -webkit-text-emphasis: filled dot;
    text-emphasis: filled dot;
    -webkit-text-emphasis-position: over;
    text-emphasis-position: over;
  }
  .na-beam-1 {
    border-top: 2px solid black;
    padding-top: 3px;
  }
  
  /* Approach 2: text-decoration */
  .na-beam-td {
    text-decoration: overline;
    text-decoration-thickness: 2px;
  }
  
  /* Approach 3: using ::before for dot, inline-grid */
  .na-dot-grid {
    display: inline-grid;
    grid-template-columns: 1fr;
    justify-items: center;
    line-height: 1;
  }
  .na-dot-grid::before {
    content: "•";
    font-size: 0.6em;
    line-height: 0.5;
  }
  
</style>
</head>
<body>

<div class="test-case">
  <div>1. Current: Beam (border) wrapping Dot (text-emphasis)</div>
  <span class="na-beam-1"><span class="na-dot-above">3</span></span>
</div>

<div class="test-case">
  <div>2. Current reversed: Dot wrapping Beam</div>
  <span class="na-dot-above"><span class="na-beam-1">3</span></span>
</div>

<div class="test-case">
  <div>3. TD: Beam (text-decoration) wrapping Dot</div>
  <span class="na-beam-td"><span class="na-dot-above">3</span></span>
</div>

<div class="test-case">
  <div>4. TD reversed: Dot wrapping Beam</div>
  <span class="na-dot-above"><span class="na-beam-td">3</span></span>
</div>

<div class="test-case">
  <div>5. Grid Dot inside Beam</div>
  <span class="na-beam-1" style="padding-top: 0;"><span class="na-dot-grid">3</span></span>
</div>

</body>
</html>
