<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: sans-serif;
    font-size: 40px;
    margin: 50px;
    line-height: 1.8; 
  }
  
  .na-beam-1 {
    border-top: 1.5px solid black;
    padding-top: 0.8em;
  }
  
  .na-beam-2 {
    border-top: 1.5px solid black;
    padding-top: 0.8em;
    /* First inset is gap (2px), second inset is the line (1.5px) */
    box-shadow: inset 0 2.5px 0 0 transparent, inset 0 4px 0 0 black;
  }

  /* Secondary Beam (Nested) */
  .na-beam-1 .na-beam-2 {
    border-top: 1.5px solid black;
    padding-top: 0.8em;
    box-shadow: inset 0 2.5px 0 0 transparent, inset 0 4px 0 0 black;
  }

  .na-beam-2 .na-beam-1 {
    border-top: none;
    padding-top: 0;
    box-shadow: none;
  }

  .na-dot-above {
    -webkit-text-emphasis: filled dot;
    text-emphasis: filled dot;
    -webkit-text-emphasis-position: over;
    text-emphasis-position: over;
  }
</style>
</head>
<body>

<div>Testing Box Shadow for Beams:</div>

<div style="margin-top: 50px;">
  Text 
  <span class="na-beam-1">2 </span>
  <span class="na-beam-1 na-beam-2">2 </span>
  <span class="na-beam-1"><span class="na-dot-above">2</span></span>
</div>

<div style="margin-top: 50px;">
  Text 
  <span class="na-beam-1">
    <span>2</span>
    <span class="na-beam-2">2</span>
    <span class="na-dot-above">2</span>
  </span>
</div>

</body>
</html>
