<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: sans-serif;
    font-size: 40px;
    margin: 50px;
    line-height: 1.8; 
  }
  
  .na-beam-1 {
    border-top: 1.5px solid black;
    padding-top: 0.8em;
  }
  
  .na-beam-2 {
    border-top: 1.5px solid black;
    padding-top: 0.8em;
    background-image: linear-gradient(to bottom, transparent 2.5px, black 2.5px, black 4px, transparent 4px);
  }

  /* Secondary Beam (Nested) */
  .na-beam-1 .na-beam-2 {
    border-top: 1.5px solid black;
    padding-top: 0.8em;
    background-image: linear-gradient(to bottom, transparent 2.5px, black 2.5px, black 4px, transparent 4px);
  }

  .na-beam-2 .na-beam-1 {
    border-top: none;
    padding-top: 0;
    background-image: none;
  }

</style>
</head>
<body>

<div>Testing Linear Gradient for Beams:</div>

<div style="margin-top: 50px;">
  Text 
  <span class="na-beam-1">2 </span>
  <span class="na-beam-1 na-beam-2">2 </span>
  <span class="na-beam-1"><span class="na-dot-above">2</span></span>
</div>

<div style="margin-top: 50px;">
  Text 
  <span class="na-beam-1">
    <span>3</span>
    <span class="na-beam-2">3</span>
    <span class="na-beam-2">3</span>
  </span>
</div>

</body>
</html>
